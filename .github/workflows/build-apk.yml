# MaidMic CI — 自动构建 APK
# ============================================================
# 每次推送到 main 时自动编译 APK，并上传为 artifact。
# 在 Actions 页面可直接下载 .apk 文件。

name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./maidmic-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaidMic-debug
          path: maidmic-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30
