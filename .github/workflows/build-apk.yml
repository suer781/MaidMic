# MaidMic CI — 自动构建 APK
# ============================================================
# 每次推送到 main/develop 时自动编译 APK。
# 成果物可在 Actions 页面下载。
#
# 如果你想要 release APK，可以手动触发 workflow_dispatch。

name: Build APK

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x maidmic-app/gradlew
        working-directory: ${{ github.workspace }}

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > maidmic-app/local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: ${{ github.workspace }}/maidmic-app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maidmic-debug
          path: maidmic-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
